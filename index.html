<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Íris</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #F5F0E8;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    .header {
      background-color: #1C1C1C;
      padding: 52px 24px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-esquerda { display: flex; flex-direction: column; gap: 2px; }

    .app-logo {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      color: #C8A96E;
      font-size: 22px;
      letter-spacing: 4px;
    }

    .app-saudacao {
      font-family: 'Caveat', cursive;
      color: #666;
      font-size: 16px;
    }

    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1.5px solid #C8A96E;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 600; color: #C8A96E;
      cursor: pointer;
    }

    .corpo {
      padding: 24px 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .btn-criar {
      background-color: #1C1C1C;
      border: none;
      border-radius: 14px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s ease;
    }

    .btn-criar:active { opacity: 0.75; }

    .btn-criar-icone {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 2px solid #C8A96E;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      color: #C8A96E;
      flex-shrink: 0;
      line-height: 1;
    }

    .btn-criar-texto { text-align: left; }

    .btn-criar-titulo {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 16px;
      color: #C8A96E;
      display: block;
      letter-spacing: 0.3px;
    }

    .btn-criar-sub {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: #666;
      display: block;
      margin-top: 2px;
    }

    .secao-titulo {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: -12px;
    }

    .volumes {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .volume-card {
      background-color: white;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: box-shadow 0.15s ease;
    }

    .volume-card:active { box-shadow: 0 3px 12px rgba(0,0,0,0.12); }

    .volume-cor {
      width: 42px; height: 42px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .volume-info { flex: 1; min-width: 0; }

    .volume-nome {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 15px;
      color: #2C2015;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .volume-meta {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: #BBB;
      display: block;
      margin-top: 1px;
    }

    .volume-seta {
      font-size: 16px;
      color: #DDD;
      flex-shrink: 0;
    }

    .volume-badge {
      width: 8px; height: 8px;
      border-radius: 50%;
      background-color: #C8A96E;
      flex-shrink: 0;
    }

    .whatsapp-hint {
      background-color: #EDE7DA;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .whatsapp-hint:active { opacity: 0.75; }

    .whatsapp-icone { font-size: 22px; flex-shrink: 0; }

    .whatsapp-texto {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: #8B7355;
      line-height: 1.5;
    }

    .whatsapp-texto strong {
      color: #2C2015;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-esquerda">
      <span class="app-logo">ÍRIS</span>
      <span class="app-saudacao">boa tarde, Luísa</span>
    </div>
    <div class="avatar">L</div>
  </div>

  <div class="corpo">

    <button class="btn-criar" onclick="window.location.href='criar_lista.html'">
      <div class="btn-criar-icone">+</div>
      <div class="btn-criar-texto">
        <span class="btn-criar-titulo">Criar novo volume</span>
        <span class="btn-criar-sub">lista de compras por enquanto</span>
      </div>
    </button>

    <div class="secao-titulo">Meus volumes</div>

    <div class="volumes">
      <div class="volume-card" onclick="window.location.href='moleskine.html'">
        <div class="volume-cor" style="background-color: #E8F5EE;">🛒</div>
        <div class="volume-info">
          <span class="volume-nome">Lista de compras</span>
          <span class="volume-meta">atualizado hoje · 8 itens pendentes</span>
        </div>
        <div class="volume-badge"></div>
        <span class="volume-seta">›</span>
      </div>
    </div>

    <div class="whatsapp-hint" onclick="window.location.href='chat.html'">
      <span class="whatsapp-icone">💬</span>
      <span class="whatsapp-texto">
        <strong>Fale com a Íris</strong> — pergunte o que tá faltando, preços, ou o que jantar hoje.
      </span>
    </div>

  </div>

</body>
</html>
