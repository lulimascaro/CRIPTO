<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Íris — Lista de Compras</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Caveat+Brush&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #F5F0E8;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    .header {
      background-color: #1C1C1C;
      padding: 52px 24px 20px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .app-logo {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      color: #C8A96E;
      font-size: 22px;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
    }

    .app-logo span {
      display: block;
      font-weight: 400;
      font-size: 10px;
      color: #666;
      letter-spacing: 2px;
      margin-top: 1px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid #C8A96E;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: #C8A96E;
      cursor: pointer;
    }

    .titulo-pagina {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      color: #F5F0E8;
      font-size: 28px;
      line-height: 1;
      letter-spacing: -0.5px;
    }

    .subtitulo-pagina {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      color: #666;
      font-size: 13px;
      margin-top: 3px;
      letter-spacing: 0.3px;
    }

    .caderno {
      position: relative;
      background-color: #F5F0E8;
      background-image: repeating-linear-gradient(
        transparent, transparent 31px,
        #C8BFA8 31px, #C8BFA8 32px
      );
      background-position: 0 0;
      padding-left: 28px;
    }

    .caderno::before {
      content: '';
      position: absolute;
      left: 20px;
      top: 0; bottom: 0;
      width: 1.5px;
      background-color: rgba(180, 90, 90, 0.30);
      z-index: 1;
    }

    .indicadores {
      height: 64px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-right: 16px;
    }

    .geladeira-row {
      height: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .geladeira-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: #999;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .barra-container {
      flex: 1;
      height: 5px;
      background-color: #DDD5C4;
      border-radius: 3px;
      overflow: hidden;
    }

    .barra-fill {
      height: 100%;
      background: linear-gradient(90deg, #8B7355, #C8A96E);
      border-radius: 3px;
    }

    .barra-pct {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: #8B7355;
    }

    .nivel-row {
      height: 32px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: #999;
    }

    .nivel-row strong {
      color: #C8A96E;
      font-weight: 500;
    }

    .setor-label {
      height: 32px;
      display: flex;
      align-items: center;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 11px;
      color: #8B7355;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding-right: 16px;
    }

    .lista { list-style: none; padding-right: 16px; }

    .item {
      height: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .checkbox {
      width: 16px;
      height: 16px;
      border: 1.5px solid #8B7355;
      border-radius: 2px;
      flex-shrink: 0;
      position: relative;
      background: transparent;
    }

    .checkbox.marcado::after {
      content: '✓';
      position: absolute;
      top: -8px; left: 0px;
      font-family: 'Caveat', cursive;
      font-size: 22px;
      color: #5C4A2A;
      font-weight: 700;
    }

    .item-nome {
      font-family: 'Caveat', cursive;
      font-size: 22px;
      color: #2C2015;
      line-height: 32px;
      flex: 1;
      transition: all 0.15s ease;
    }

    .item-nome.riscado {
      text-decoration: line-through;
      text-decoration-color: #8B7355;
      color: #B0A090;
    }

    .item-detalhe {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: #C8BFA8;
      line-height: 32px;
      flex-shrink: 0;
    }

    .tag-iris {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      color: #C8A96E;
      border: 1px solid #C8A96E;
      border-radius: 20px;
      padding: 0 6px;
      line-height: 16px;
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }

    .item-preco {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: #B0A090;
      line-height: 32px;
      white-space: nowrap;
      flex-shrink: 0;
      text-align: right;
      min-width: 64px;
    }

    .item-preco.subiu { color: #B8763A; }
    .item-preco.baixou { color: #6B9E6B; }
    .item-preco.sem-historico {
      color: #CCC5B5;
      font-style: italic;
      font-weight: 400;
    }

    .legenda-preco {
      height: 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding-right: 16px;
    }

    .legenda-preco span {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 3px;
      letter-spacing: 0.3px;
    }

    .anotacao {
      height: 32px;
      display: flex;
      align-items: center;
      font-family: 'Caveat', cursive;
      font-size: 16px;
      color: #9B7D5A;
      padding-right: 16px;
    }

    .espaco { height: 32px; }

    .rodape {
      background-color: #EDE7DA;
      padding: 14px 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-top: 2px solid #C8BFA8;
    }

    .botao-principal {
      background-color: #1C1C1C;
      color: #C8A96E;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 14px;
      border-radius: 6px;
      border: none;
      width: 100%;
      cursor: pointer;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .botao-secundario {
      background-color: transparent;
      color: #8B7355;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 12px;
      border-radius: 6px;
      border: 1.5px solid #C8BFA8;
      width: 100%;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-top">
      <div class="app-logo" onclick="window.location.href='index.html'">ÍRIS <span>agenda pessoal</span></div>
      <div class="avatar" onclick="window.location.href='index.html'">L</div>
    </div>
    <div class="titulo-pagina" id="titulo"></div>
    <div class="subtitulo-pagina" id="data"></div>
  </div>

  <div class="caderno">
    <div class="indicadores">
      <div class="geladeira-row">
        <span class="geladeira-label">Geladeira</span>
        <div class="barra-container"><div class="barra-fill" id="barra"></div></div>
        <span class="barra-pct" id="barra-pct"></span>
      </div>
      <div class="nivel-row" id="nivel"></div>
    </div>

    <div class="legenda-preco">
      <span style="color:#B8763A;">↑ subiu</span>
      <span style="color:#6B9E6B;">↓ baixou</span>
      <span style="color:#CCC5B5; font-style:italic;">sem histórico</span>
    </div>

    <div id="setores"></div>

    <div class="anotacao" id="anotacao"></div>

    <div class="espaco"></div>
    <div class="espaco"></div>
    <div class="espaco"></div>
  </div>

  <div class="rodape">
    <button class="botao-principal">Finalizar compra</button>
    <button class="botao-secundario" onclick="window.location.href='historico.html'">Ver histórico</button>
  </div>

<script>
const precoLabel = { subiu: '↑ ', baixou: '↓ ', normal: '', 'sem-historico': '' }

function toggle(item) {
  const cb = item.querySelector('.checkbox')
  const nome = item.querySelector('.item-nome')
  cb.classList.toggle('marcado')
  nome.classList.toggle('riscado')
  localStorage.setItem(nome.textContent.trim(), cb.classList.contains('marcado'))
}

fetch('lista.json')
  .then(r => r.json())
  .then(data => {
    document.getElementById('titulo').textContent = data.titulo
    document.getElementById('data').textContent = data.data
    document.getElementById('barra').style.width = data.geladeira_pct + '%'
    document.getElementById('barra-pct').textContent = data.geladeira_pct + '%'
    document.getElementById('nivel').innerHTML = data.nivel.replace('—', '— <strong>').replace(/(.*)(<\/strong>)/, '$1</strong>')
    document.getElementById('anotacao').textContent = data.anotacao

    const container = document.getElementById('setores')

    data.setores.forEach(setor => {
      const label = document.createElement('div')
      label.className = 'setor-label'
      label.textContent = setor.nome
      container.appendChild(label)

      const ul = document.createElement('ul')
      ul.className = 'lista'

      setor.itens.forEach(item => {
        const salvo = localStorage.getItem(item.nome)
        const marcado = salvo !== null ? salvo === 'true' : item.marcado

        const li = document.createElement('li')
        li.className = 'item'
        li.onclick = function() { toggle(this) }

        const cb = document.createElement('div')
        cb.className = 'checkbox' + (marcado ? ' marcado' : '')

        const nome = document.createElement('span')
        nome.className = 'item-nome' + (marcado ? ' riscado' : '')
        nome.textContent = item.nome

        li.appendChild(cb)
        li.appendChild(nome)

        if (item.detalhe) {
          const det = document.createElement('span')
          det.className = 'item-detalhe'
          det.textContent = item.detalhe
          li.appendChild(det)
        }

        if (item.iris) {
          const tag = document.createElement('span')
          tag.className = 'tag-iris'
          tag.textContent = 'Íris'
          li.appendChild(tag)
        }

        const preco = document.createElement('span')
        preco.className = 'item-preco' + (item.preco_tipo !== 'normal' ? ' ' + item.preco_tipo : '')
        preco.textContent = precoLabel[item.preco_tipo] + item.preco
        li.appendChild(preco)

        ul.appendChild(li)
      })

      container.appendChild(ul)
    })

    // nivel text fix
    const nivelEl = document.getElementById('nivel')
    nivelEl.innerHTML = data.nivel.replace('— ', '— <strong>') + '</strong>'
  })
</script>

</body>
</html>
